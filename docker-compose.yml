services:
  mcp-memory:
    build: ./mcp-memory
    environment:
      SQLITE_PATH: /data/memory.db
      OBSIDIAN_VAULT: /vault
      MCP_PORT: "8080"
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_STRATEGY: ollama
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_SIZE: "768"
    volumes:
      - ./data:/data
      - ./obsidian-vault:/vault
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    command: ["python", "-m", "mcp_memory.main", "--host", "0.0.0.0", "--port", "8080", "--serve"]
    healthcheck:
      test: ["CMD", "python", "-m", "mcp_memory.health_check", "/data/memory.db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:0.6.8
    volumes:
      - ollama_data:/root/.ollama
    # Start server in background, then pull model; subsequent runs skip pull (already cached)
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list 2>&1 | grep -q nomic-embed-text"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  ollama_data:
